{% extends "base.html" %}
{% block title %}AGENTS.md · enso{% endblock %}

{% block content %}
<div class="mb-4">
  <h1 class="text-2xl font-semibold tracking-tight">AGENTS.md</h1>
  <p class="mt-1 text-sm text-gray-500 dark:text-neutral-400">Shared instructions for every agent in this workspace.</p>
  <div class="break-anywhere mt-2 font-mono text-xs text-gray-400 dark:text-neutral-500">{{ path }}</div>
</div>

<form method="post" action="/agents/edit"
      class="rounded-lg border border-gray-200 bg-white p-4 shadow-sm
             dark:border-neutral-700 dark:bg-neutral-800">
  <label for="agents-content" class="sr-only">AGENTS.md content</label>
  <textarea id="agents-content" name="content" rows="28" spellcheck="false"
            class="w-full rounded-md border border-gray-300 bg-white px-3 py-2 font-mono text-sm
                   focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500
                   dark:border-neutral-600 dark:bg-neutral-900 dark:text-gray-100">{{ content }}</textarea>
  <div class="mt-3">
    <button type="submit"
            class="touch-target rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white
                   hover:bg-indigo-500 focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500
                   focus-visible:ring-offset-2">
      Save AGENTS.md
    </button>
  </div>
</form>
{% endblock %}
