<div id="task-status" class="rounded-lg border border-gray-200 bg-white p-4 shadow-sm
                             dark:border-neutral-700 dark:bg-neutral-800">
  <h2 class="mb-3 text-lg font-semibold">Status</h2>
  <form method="post" action="/tasks/{{ task.slug }}/status"
        hx-post="/tasks/{{ task.slug }}/status" hx-target="#task-status" hx-swap="outerHTML"
        class="flex flex-col gap-3 sm:flex-row sm:items-end">
    <div class="sm:w-48">
      <label for="task-status-select"
             class="mb-1 block text-sm font-medium text-gray-700 dark:text-neutral-300">
        Current status
      </label>
      <select id="task-status-select" name="status"
              onchange="document.getElementById('blocked-reason-field').classList.toggle('hidden', this.value !== 'blocked')"
              class="w-full rounded-md border border-gray-300 bg-white px-3 py-2 text-sm
                     focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500
                     dark:border-neutral-600 dark:bg-neutral-900 dark:text-gray-100">
        {% for s in statuses %}
          <option value="{{ s }}" {% if s == task.status %}selected{% endif %}>
            {{ s.replace('_', ' ') }}
          </option>
        {% endfor %}
      </select>
    </div>
    <div id="blocked-reason-field" class="min-w-0 flex-1 {% if task.status != 'blocked' %}hidden{% endif %}">
      <label for="blocked-reason"
             class="mb-1 block text-sm font-medium text-gray-700 dark:text-neutral-300">
        What is blocking it?
      </label>
      <input id="blocked-reason" name="reason" value="{{ task.blocked_reason or '' }}"
             placeholder="Add a short reason"
             class="w-full rounded-md border border-gray-300 bg-white px-3 py-2 text-sm
                    focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500
                    dark:border-neutral-600 dark:bg-neutral-900 dark:text-gray-100">
    </div>
    <button type="submit"
            class="touch-target rounded-md bg-gray-900 px-4 py-2 text-sm font-medium text-white
                   hover:bg-gray-700 focus:outline-none focus-visible:ring-2 focus-visible:ring-gray-500
                   focus-visible:ring-offset-2 dark:bg-gray-100 dark:text-gray-900 dark:hover:bg-white">
      Update status
    </button>
  </form>
</div>
