{% from "macros.html" import task_badge %}
<div id="task-status" class="rounded-lg border border-gray-200 bg-white p-4 shadow-sm
                             dark:border-neutral-700 dark:bg-neutral-800">
  <div class="mb-3 flex items-center gap-2">
    <span class="text-sm font-medium text-gray-500 dark:text-neutral-400">Status</span>
    {{ task_badge(task.status) }}
  </div>
  {% if task.blocked_reason %}
    <p class="mb-3 rounded-md bg-amber-50 px-3 py-2 text-sm text-amber-800
              dark:bg-amber-900/20 dark:text-amber-300">
      Blocked: {{ task.blocked_reason }}
    </p>
  {% endif %}
  <form method="post" action="/tasks/{{ task.slug }}/status"
        hx-post="/tasks/{{ task.slug }}/status" hx-target="#task-status" hx-swap="outerHTML"
        class="flex flex-wrap items-center gap-2">
    <input name="reason" placeholder="blocked reason (optional)"
           class="min-w-[12rem] flex-1 rounded-md border border-gray-300 bg-white px-2 py-1 text-sm
                  dark:border-neutral-600 dark:bg-neutral-900 dark:text-gray-100">
    {% for s in statuses %}
      <button name="status" value="{{ s }}"
              class="rounded-md border px-3 py-1 text-xs font-medium
                     {% if s == task.status %}border-indigo-500 bg-indigo-50 text-indigo-700
                       dark:bg-indigo-900/40 dark:text-indigo-300
                     {% else %}border-gray-300 hover:bg-gray-50
                       dark:border-neutral-600 dark:hover:bg-neutral-700{% endif %}">
        {{ s.replace('_', ' ') }}
      </button>
    {% endfor %}
  </form>
</div>
